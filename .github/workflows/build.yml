# Reusable workflow. Model repos call it:
#   jobs: { crate: { uses: ModelAtlasofTheEarth/crate-kit/.github/workflows/build.yml@v0 } }
# Runs against the CALLER's checkout. The toolkit is installed by the caller's environment.yml
# (single pinned-version source), so local and CI behave identically.
#
# If `issue_body` is passed (from an `on: issues` caller), it first writes those answers into
# the crate via `crate from-issue`; then build/validate/render run as usual.
name: build-crate

on:
  workflow_call:
    inputs:
      render:
        type: boolean
        default: true
      issue_body:
        type: string
        required: false
        default: ""
      issue_number:
        type: string
        required: false
        default: ""
      issue_title:
        type: string
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    # Permissions are set by the CALLER (a reusable workflow can't request more than the caller
    # grants, or the run fails to start). Push callers grant `contents: write`; the on-issue
    # caller also grants `issues: write` for the comment step.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history -> git provenance

      - name: ensure issue-form labels exist
        # GitHub issue forms can only APPLY a label that already exists; a fresh template repo has
        # only the default labels, so `crate-edit` is silently dropped and the on-issue gate misses.
        # Create it (idempotent) on every build so the label-gate matches even if a user edits the
        # issue title. Needs issues:write (granted by the caller).
        if: ${{ !endsWith(github.repository, '-template') }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create crate-edit --repo "${{ github.repository }}" \
            --color BFD4F2 --description "M@TE crate edit (issue forms)" --force || true

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true

      - name: apply issue submission (if any)
        if: ${{ inputs.issue_body != '' }}
        shell: bash -el {0}
        env:
          ISSUE_BODY: ${{ inputs.issue_body }}    # via env, not interpolated into the script
        run: |
          printf '%s' "$ISSUE_BODY" > /tmp/issue.md
          # One generic edit-entity form (target defaults to root). --print-command writes the
          # equivalent `crate` command to stdout; the JSON result (incl. any error) goes to stderr.
          # Record ok/fail so the comment step NEVER reports a misleading success on a no-op.
          if crate from-issue . --body /tmp/issue.md --print-command \
               > /tmp/crate_command.txt 2> /tmp/crate_result.json; then
            echo ok > /tmp/apply_status
          else
            echo fail > /tmp/apply_status
          fi

      - name: build + validate
        shell: bash -el {0}
        run: |
          crate build .
          crate validate .

      - name: enrich (external PIDs + internal content; best-effort, never fails the build)
        shell: bash -el {0}
        run: |
          crate enrich . || echo "external enrich skipped"
          crate enrich --internal . || echo "internal enrich skipped"

      - name: readiness → job summary (the catalogue traffic-light)
        if: ${{ !endsWith(github.repository, '-template') }}
        continue-on-error: true
        shell: bash -el {0}
        run: |
          crate readiness . --repo-url "${{ github.server_url }}/${{ github.repository }}" --markdown \
            >> "$GITHUB_STEP_SUMMARY" || true

      - name: maintain the "Model readiness" status issue (best-effort; needs issues:write)
        if: ${{ !endsWith(github.repository, '-template') }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        shell: bash -el {0}
        run: |
          crate readiness . --repo-url "$REPO_URL" --markdown > /tmp/readiness.md || exit 0
          TITLE="📋 Model readiness"
          NUM=$(gh issue list --state open --search "in:title $TITLE" --json number,title \
                --jq ".[] | select(.title==\"$TITLE\") | .number" 2>/dev/null | head -1 || true)
          if [ -n "$NUM" ]; then
            gh issue edit "$NUM" --body-file /tmp/readiness.md
          else
            gh issue create --title "$TITLE" --body-file /tmp/readiness.md --label crate-status 2>/dev/null \
              || gh issue create --title "$TITLE" --body-file /tmp/readiness.md
          fi

      - name: render
        if: ${{ inputs.render }}
        shell: bash -el {0}
        run: crate render . -o _site

      - name: refresh issue forms from the crate (folders / image files / per-type)
        # One engine call regenerates every dynamic form so each picker tracks the repo: the data
        # form's folder list, the content form's image/video files, and one "Edit a <type> entity"
        # form per component type that opts in (`form: true`) and has entities. All "which" comes
        # from the crate + profile — no domain logic in the workflow. Git-diff below only re-commits
        # when something actually changed.
        shell: bash -el {0}
        run: crate refresh-forms --repo . --out .github/ISSUE_TEMPLATE

      - name: commit regenerated crate (+ refreshed form)
        shell: bash -el {0}
        run: |
          git config user.name  "crate-bot"
          git config user.email "crate-bot@users.noreply.github.com"
          git add ro-crate-metadata.json
          git add .github/ISSUE_TEMPLATE 2>/dev/null || true   # incl. dynamically-named typed forms
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "Update crate + issue form [skip ci]"
            git push
          fi

      - name: comment on the submission issue
        # ALWAYS comment when an issue triggered this — success OR failure. Never let a submission
        # vanish silently (the v1 failure mode): if the apply failed, say why and how to retry.
        if: ${{ inputs.issue_number != '' && inputs.issue_body != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUS=$(cat /tmp/apply_status 2>/dev/null || echo ok)
          if [ "$STATUS" = "fail" ]; then
            ERR=$(python3 -c "import json,sys;print(json.load(open('/tmp/crate_result.json')).get('error','(see the Actions log)'))" 2>/dev/null || echo "(see the Actions log)")
            {
              echo "⚠️ **Nothing was written to the crate** — I couldn't apply this submission."
              echo ""
              echo "**Reason:** $ERR"
              echo ""
              echo "Edit this issue to fix it and it'll retry automatically, or ask for help."
            } > /tmp/comment.md
          else
            CMD=$(cat /tmp/crate_command.txt 2>/dev/null || true)
            {
              echo "✅ Applied to \`ro-crate-metadata.json\` — the single source of truth. Edit the crate (CLI / Crate-O), not this issue."
              if [ -n "$CMD" ]; then
                printf '\nThe command-line equivalent (run it locally next time to skip the round-trip):\n\n'
                printf '```\n%s\n```\n' "$CMD"
                echo "For type-specific fields, open the crate in Crate-O."
              fi
            } > /tmp/comment.md
          fi
          gh issue comment "${{ inputs.issue_number }}" --body-file /tmp/comment.md

      - name: upload site artifact
        if: ${{ inputs.render }}
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site
