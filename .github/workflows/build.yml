# Reusable workflow. Model repos call it:
#   jobs: { mate: { uses: ModelAtlasofTheEarth/mate-toolkit/.github/workflows/build.yml@v0 } }
# Runs against the CALLER's checkout. The toolkit is installed by the caller's environment.yml
# (single pinned-version source), so local and CI behave identically.
#
# If `issue_body` is passed (from an `on: issues` caller), it first writes those answers into
# the crate via `mate from-issue`; then build/validate/render run as usual.
name: build-mate-model

on:
  workflow_call:
    inputs:
      render:
        type: boolean
        default: true
      issue_body:
        type: string
        required: false
        default: ""
      issue_number:
        type: string
        required: false
        default: ""
      issue_title:
        type: string
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    # Permissions are set by the CALLER (a reusable workflow can't request more than the caller
    # grants, or the run fails to start). Push callers grant `contents: write`; the on-issue
    # caller also grants `issues: write` for the comment step.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history -> git provenance

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true

      - name: apply issue submission (if any)
        if: ${{ inputs.issue_body != '' }}
        shell: bash -el {0}
        env:
          ISSUE_BODY: ${{ inputs.issue_body }}    # via env, not interpolated into the script
        run: |
          printf '%s' "$ISSUE_BODY" > /tmp/issue.md
          # One generic edit-entity form (target defaults to root). --print-command writes the
          # equivalent `mate` command to stdout; capture it for the confirmation comment.
          mate from-issue . --body /tmp/issue.md --print-command > /tmp/mate_command.txt || true

      - name: build + validate
        shell: bash -el {0}
        run: |
          mate build .
          mate validate .

      - name: enrich PIDs (best-effort; never fails the build)
        shell: bash -el {0}
        run: mate enrich . || echo "enrich skipped"

      - name: render
        if: ${{ inputs.render }}
        shell: bash -el {0}
        run: mate render . -o _site

      - name: commit regenerated crate
        shell: bash -el {0}
        run: |
          git config user.name  "mate-bot"
          git config user.email "mate-bot@users.noreply.github.com"
          git add ro-crate-metadata.json
          if git diff --cached --quiet; then
            echo "crate unchanged"
          else
            git commit -m "Update ro-crate-metadata.json [skip ci]"
            git push
          fi

      - name: comment on the submission issue
        if: ${{ inputs.issue_number != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CMD=$(cat /tmp/mate_command.txt 2>/dev/null || true)
          {
            echo "✅ Applied to \`ro-crate-metadata.json\` — the single source of truth. Edit the crate (CLI / Crate-O), not this issue."
            if [ -n "$CMD" ]; then
              printf '\nThe command-line equivalent (run it locally next time to skip the round-trip):\n\n'
              printf '```\n%s\n```\n' "$CMD"
              echo "For type-specific fields, open the crate in Crate-O."
            fi
          } > /tmp/comment.md
          gh issue comment "${{ inputs.issue_number }}" --body-file /tmp/comment.md

      - name: upload site artifact
        if: ${{ inputs.render }}
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site
