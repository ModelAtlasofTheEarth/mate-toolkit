# Fully tracked environment. The SAME file is used locally and in CI (micromamba),
# so behaviour is identical. `pip: [.]` installs the mate-toolkit package, which pulls
# rocrate / pyyaml / pathspec from pyproject.toml. quarto comes from conda-forge.
#
#   conda env create -f environment.yml      # creates env "mate"
#   conda activate mate
#   mate build . && mate validate . && mate render . -o _site
name: mate
channels: [conda-forge]
dependencies:
  - python=3.11
  - quarto
  - pip
  - pip:
      - .
