# ─────────────────────────────────────────────────────────────────────────────
# BASE PROFILE — the generic schema.org layer.
#
# The domain-FREE contract: turn ANY GitHub repository into a schema.org RO-Crate.
# It uses schema.org only — no CodeMeta, no discipline vocabulary. Higher layers
# extend this: a `computational` profile adds CodeMeta (build instructions, etc.);
# a `geoscience` profile adds a discipline vocabulary. The engine itself knows
# nothing about any of them — it just executes whichever profile it's given.
# ─────────────────────────────────────────────────────────────────────────────
profile: base
version: 0

# Vocabularies this profile imports (loaded by crate_kit/vocab.py). Terms become available as
# `additionalType` roles to the role verb, the issue form, and validate. `communication` supplies
# the website-asset roles (graphical-abstract, model-setup-diagram, figure, …) the website: block
# below references. Drop a vocab here to opt a discipline into its terms; the engine itself is generic.
imports:
  - communication

# Internal enrich: derive metadata from the repo's own content (gap-fill, best-effort). `license`
# reads a LICENSE/COPYING file → an SPDX id on the root, so a repo that already has a license file
# doesn't have to re-type it. (`crate enrich --internal`.)
internal_enrich:
  - license

# Pinned JSON-LD contexts — declared in the crate's @context, never fetched live at build time.
# CodeMeta is added so the software fields below (buildInstructions, developmentStatus, …) resolve
# to real URIs. A discipline adds its own context the same way (e.g. a biology profile → Bioschemas).
context:
  - https://w3id.org/ro/crate/1.1/context
  - https://schema.org/
  - https://doi.org/10.5063/schema/codemeta-2.0

# Root entity (RO-Crate requires a schema.org Dataset). Universal fields only.
root:
  type: Dataset
  fields:
    title:       { property: name,        required: true,  input: text,     label: "Dataset title (the human-readable name, not the repo slug)" }
    description: { property: description,  required: true,  input: textarea, label: "Short description" }
    license:     { property: license,      required: true,  input: dropdown, label: "License", options: [CC-BY-4.0, CC-BY-SA-4.0, CC0-1.0, Apache-2.0, MIT, GPL-3.0, LGPL-3.0, MPL-2.0, "(other URL)"] }
    creators:    { property: creator,      required: true,  input: people, many: true, label: "Creator(s) — ORCID iD or 'Family, Given'", enrich: author }
    keywords:    { property: keywords,     required: false, input: list, many: true, label: "Keywords" }
    publication: { property: citation,     required: false, input: text,     label: "Related publication (DOI)", enrich: publication }

# Website-asset whitelist: which file types the "Tag website content" form offers (images /
# animations destined for the page). Policy, not mechanism — a discipline tunes this list.
website_asset_types: [.png, .jpg, .jpeg, .gif, .svg, .webp, .tif, .tiff, .mp4, .webm, .mov]

# Generic external-payload backends (no discipline-specific stores).
payload:
  backends: [git, zenodo, url]

# Contextual entities = "remote" things, added BY REFERENCE (a PID), linked to the root, then
# materialised by `enrich`. (Local things are data entities — files/folders.) Each kind declares
# its @type, the root property it links through, an id hint, and which enrich resolver fills it.
# This is the references crosswalk as config; the "Add a contextual entity" form is generated from it.
contextual:
  creator:
    label: "Creator / author (a person)"
    type: Person
    link: creator
    id_hint: "ORCID iD, e.g. 0000-0002-1825-0097"
    enrich: author
  publication:
    label: "Publication (article / preprint)"
    type: ScholarlyArticle
    link: citation
    id_hint: "DOI, e.g. 10.1038/s41586-020-2649-2"
    enrich: publication
  software:
    label: "Software used"
    type: SoftwareApplication       # default; refined by detect_type below
    # detect_type = declarative @type refinement (the engine just executes these rules — no domain
    # code). A source-host URL is source code; everything else stays the default application. A
    # different discipline writes its own rules here (e.g. a specimen PID → BioSample).
    detect_type:
      - { match: "github.com",    type: SoftwareSourceCode }
      - { match: "gitlab.com",    type: SoftwareSourceCode }
      - { match: "bitbucket.org", type: SoftwareSourceCode }
      - { match: "codeberg.org",  type: SoftwareSourceCode }
    link: mentions
    id_hint: "DOI or homepage URL"
    enrich: software        # resolver not built yet -> stays a stub until then
  funder:
    label: "Funder / organisation"
    type: Organization
    link: funder
    id_hint: "ROR id or URL"
    enrich: organization    # resolver not built yet -> stays a stub until then
  remote_data:
    label: "Remote data payload (large data hosted elsewhere)"
    type: Dataset
    link: distribution
    id_hint: "DOI or URL (Zenodo, NCI, …)"
    enrich: null

# Enrichment = a declarative CROSSWALK, and it IS the filter. Each resolver is keyed by the
# contextual kind it serves and declares:
#   match      — an @id substring that selects this resolver (orcid.org, doi.org, …)
#   url        — the API to fetch; {id} is the PID pulled from the entity's @id
#   id_pattern — (optional) regex (group 1) to extract {id}; default = everything after `match/`
#   map        — target schema.org property  <-  a JMESPath path into the response,
#                optionally `{ path: …, transform: <name> }`. SCOPE = exactly what you map;
#                nothing else is pulled in. Built-in transforms: join · join_date · first · people.
# A niche resolver (figshare, software-heritage, GRID, …) is added by appending a block here —
# no engine code. The toolkit holds the generic fetch + JMESPath + transform registry.
enrich:
  author:                                       # ORCID -> Person
    match: "orcid.org"
    url: "https://pub.orcid.org/v3.0/{id}/person"
    map:
      givenName:  'name."given-names".value'
      familyName: 'name."family-name".value'
      name:       { path: '[name."given-names".value, name."family-name".value]', transform: join }
  publication:                                  # Crossref -> ScholarlyArticle
    match: "doi.org"
    url: "https://api.crossref.org/works/{id}"
    map:
      name:          "message.title[0]"
      datePublished: { path: 'message.published."date-parts"[0]', transform: join_date }
      url:           "message.URL"
      author:        { path: "message.author", transform: people }
      isPartOf:      'message."container-title"[0]'                       # journal
      publisher:     "message.publisher"
      pagination:    "message.page"
      license:       { path: "message.license[0].URL", transform: id_ref }
  organization:                                 # ROR (v2) -> Organization (funders)
    match: "ror.org"
    url: "https://api.ror.org/v2/organizations/{id}"
    map:
      name: "names[?contains(types, 'ror_display')].value | [0]"
      url:  "links[?type == 'website'].value | [0]"
  software:                                     # Zenodo -> SoftwareApplication
    match: "zenodo.org"
    id_pattern: 'records/(\d+)'
    url: "https://zenodo.org/api/records/{id}"
    map:
      name:            "metadata.title"
      softwareVersion: "metadata.version"
      url:             "links.html"
      description:     { path: "metadata.description", transform: striptags }
      license:         "metadata.license.id"
      keywords:        "metadata.keywords"

# Generic catalogue gate (legacy flat list — superseded by `readiness:` below, kept for reference).
requires_for_website:
  - name
  - license
  - creator

# ── Catalogue readiness — the tiered traffic-light (crate readiness; consumed by validate) ──
# BASE is the naked, generic research-object crate: its required tier is just the schema.org Dataset
# essentials (title + creators + license). Asset requirements (≥1 image, code-or-data, an OPEN
# license) are DISCIPLINE POLICY and live in a profile like mate-geoscience — base only *demonstrates*
# the machinery (the asset roles sit in `encouraged`, never gating). Each item = a predicate
# ({property|type|role|any|all}) + a human `label` + optional `action_role` (a fix-it link pre-fill).
# See memory/minimum-asset-floor.md.
readiness:
  required:
    - { property: name,    label: "A title" }
    - { property: license, label: "A license" }
    - { property: creator, label: "At least one creator" }
  encouraged:
    - { type: ImageObject, label: "At least one image (any figure or screenshot)", action_role: figure }
    - { role: graphical-abstract, label: "A graphical abstract (the ideal hero image)", action_role: graphical-abstract }
    - { property: description,    label: "A plain-language description" }
    - { role: model-setup-diagram, label: "A model-setup diagram", action_role: model-setup-diagram }

# Component types — schema.org ONLY (no CodeMeta terms like buildInstructions).
component_types:
  Dataset:
    label: "Dataset"
    fields:
      encodingFormat:       { label: "File format(s)", input: list, help: "e.g. application/x-hdf5, text/csv" }
      variableMeasured:     { label: "Variables", input: list }
      measurementTechnique: { label: "How it was produced", input: text }
      contentSize:          { label: "Total size", input: text }
  # Software types carry schema.org fields + CodeMeta extensions (tagged `vocab: codemeta`). CodeMeta
  # is schema.org-for-software plus ~a dozen extra terms; it's a FIELD vocabulary, so it rides this
  # component_types mechanism (NOT additionalType). Any discipline extends the same way.
  SoftwareSourceCode:
    label: "Software source code"
    form: true            # generate an "Edit a software source code entity" form when one exists
    fields:
      programmingLanguage:  { label: "Language(s)", input: list }
      runtimePlatform:      { label: "Runtime platform", input: text }
      codeRepository:       { label: "Source repository", input: text }
      softwareRequirements: { label: "Requirements / dependencies", input: text }
      targetProduct:        { label: "What it produces / runs as", input: text }
      buildInstructions:    { label: "Build instructions", input: text, help: "text, or a script e.g. build.sh", vocab: codemeta }
      developmentStatus:    { label: "Development status", input: text, help: "e.g. active, inactive, unsupported (repostatus.org)", vocab: codemeta }
      issueTracker:         { label: "Issue tracker URL", input: text, vocab: codemeta }
      readme:               { label: "README URL", input: text, vocab: codemeta }
      referencePublication: { label: "Reference publication (DOI)", input: text, vocab: codemeta }
  SoftwareApplication:
    label: "Software application"
    form: true
    fields:
      softwareVersion:      { label: "Version", input: text }
      operatingSystem:      { label: "Operating system", input: text }
      applicationCategory:  { label: "Category", input: text }
      url:                  { label: "Homepage / DOI", input: text }
      softwareRequirements: { label: "Requirements / dependencies", input: text }
      downloadUrl:          { label: "Download URL", input: text }
      developmentStatus:    { label: "Development status", input: text, vocab: codemeta }
      referencePublication: { label: "Reference publication (DOI)", input: text, vocab: codemeta }
  ImageObject:
    label: "Image / figure"
    fields:
      caption:              { label: "Caption", input: text }
      encodingFormat:       { label: "Format", input: text }
      contentUrl:           { label: "URL (if hosted elsewhere)", input: text }
  CreativeWork:
    label: "Other (generic creative work)"
    fields:
      name:                 { label: "Name", input: text }
      description:          { label: "Description", input: textarea }
      url:                  { label: "URL", input: text }
      author:               { label: "Author(s)", input: people, many: true }

# ── Website content contract (TARGET_ARCHITECTURE.md §21) ──
# `crate website` projects the crate onto these slots → a flat, portable website.json (what a
# Quarto/any static site consumes). A slot draws from: a root `from:` property; all entities of a
# `type:`; or all entities tagged with a `role:` (additionalType). `project:` shapes each resolved
# entity — a property name, "@id", or a {key: prop} map. `single: true` takes the first. This is a
# CONTENT contract only — no layout/order (that's the presentation layer's call).
website:
  title:        { from: name }
  description:  { from: description }
  abstract:     { from: abstract }
  doi:          { from: citation, project: "@id", single: true }
  license:      { from: license, project: "@id", single: true }
  keywords:     { from: keywords }
  creators:     { from: creator, project: name }
  publication:  { type: ScholarlyArticle, single: true, project: { title: name, url: url, date: datePublished } }
  software:     { type: [SoftwareApplication, SoftwareSourceCode], project: { name: name, url: url, version: softwareVersion } }
  funders:      { from: funder, project: { name: name, url: url } }
  # hero rule: the tagged graphical-abstract if present, ELSE fall back to any image — so a thin
  # contributor who tagged a single plain figure still gets a card hero (memory/minimum-asset-floor).
  graphical_abstract: { role: graphical-abstract, single: true, project: { url: "@id", caption: caption }, fallback: { type: ImageObject } }
  setup_diagram:      { role: model-setup-diagram, single: true, project: { url: "@id", caption: caption } }
  figures:      { role: figure, project: { url: "@id", caption: caption } }
